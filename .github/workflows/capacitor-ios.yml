name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 1. Aggressively clean everything
      - name: 💥 Nuclear clean
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm cache clean --force

      # 2. Fresh install on macOS - this generates a correct lockfile
      - name: 📦 Fresh install for macOS
        run: npm install

      # 3. (Optional) Manually ensure the native binding exists
      - name: 🔍 Verify native binding
        run: |
          if [ ! -f "node_modules/@tailwindcss/oxide/index.js" ]; then
            echo "❌ Native binding missing, forcing rebuild..."
            npm rebuild @tailwindcss/oxide
          else
            echo "✅ Native binding found."
          fi

      - name: 🔨 Build web app
        run: npm run build

      - name: 📱 Sync Capacitor iOS
        run: npx cap sync ios

      - name: 🍏 Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: 🏗️ Build iOS app (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath ./build \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: 📦 Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -qq -r -9 CapacitorApp.ipa Payload

      - name: ⬆️ Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CapacitorIPA
          path: CapacitorApp.ipa