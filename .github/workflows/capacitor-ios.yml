name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Generate iOS project
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Create correct Podfile
        run: |
          cd ios/App
          cat > Podfile << 'EOF'
          platform :ios, '14.0'

          workspace 'App.xcworkspace'

          target 'App' do
            project 'App.xcodeproj'
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'

            target 'AppTests' do
              inherit! :search_paths
            end
          end
          EOF

      - name: Fix Xcode project
        run: |
          cd ios/App
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' App.xcodeproj/project.pbxproj

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath ./build \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -qq -r -9 CapacitorApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CapacitorIPA
          path: CapacitorApp.ipa