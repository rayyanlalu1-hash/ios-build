name: iOS IPA Build
on:
  workflow_dispatch:
jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Generate iOS project (let pod install fail here, we patch after)
        run: |
          rm -rf ios
          # `cap add ios` internally runs `pod install` as its final step and
          # there is no flag to skip this. With the default deployment target
          # it writes (13.0), pod install fails and the command exits non-zero
          # -- but by that point ios/App/Podfile and the .xcodeproj already
          # exist on disk. We let it fail here (|| true) and fix + install
          # pods ourselves in the next steps.
          npx cap add ios || true
          # sanity check: the project must actually have been scaffolded,
          # otherwise something else is wrong and we should stop the build.
          test -f ios/App/Podfile
          test -f ios/App/App.xcodeproj/project.pbxproj

      - name: Fix deployment target BEFORE pod install
        run: |
          cd ios/App
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' App.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, .*/platform :ios, '15.0'/" Podfile
          echo "=== project.pbxproj targets ==="
          grep -n "IPHONEOS_DEPLOYMENT_TARGET" App.xcodeproj/project.pbxproj
          echo "=== Podfile platform line ==="
          grep -n "platform :ios" Podfile

      - name: Copy web assets into native project (no pod install triggered)
        run: npx cap copy ios

      - name: Install CocoaPods manually
        run: |
          cd ios/App
          pod repo update
          pod install --verbose

      - name: Re-verify deployment target after pod install
        run: |
          cd ios/App
          # CocoaPods regenerates Pods.xcodeproj; make sure pods also match
          find Pods -name "*.xcconfig" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} \; 2>/dev/null || true
          grep -rn "IPHONEOS_DEPLOYMENT_TARGET" App.xcodeproj/project.pbxproj

      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath ./build \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -qq -r -9 CapacitorApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CapacitorIPA
          path: CapacitorApp.ipa
